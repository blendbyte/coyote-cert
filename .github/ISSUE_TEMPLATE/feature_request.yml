name: Feature request
description: Propose a new provider, challenge type, storage backend, or DX improvement.
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this request fall under?
      options:
        - New CA provider
        - New challenge type
        - New storage backend
        - DX / fluent API improvement
        - ARI / renewal logic
        - PSR / framework integration
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you unable to do today, or what is painful about the current approach? Be specific — a concrete use case is much more useful than an abstract description.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should CoyoteCert do? Include a code sketch if that makes it clearer.
      render: php

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Workarounds you are currently using, or other approaches you ruled out.

  - type: checkboxes
    id: pr
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this
