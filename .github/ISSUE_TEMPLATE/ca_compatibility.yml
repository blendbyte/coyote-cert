name: CA compatibility issue
description: A specific CA is rejecting requests, returning unexpected errors, or behaving differently from the RFC. Use this instead of "Bug report" when the problem appears to be CA-specific.
labels: ["ca-compatibility"]
body:
  - type: markdown
    attributes:
      value: |
        CA compatibility issues are different from library bugs — they're often caused by CA-specific quirks, non-standard error responses, or undocumented extensions to RFC 8555. Providing the raw CA response is the most important thing you can include here.

  - type: input
    id: ca_name
    attributes:
      label: Certificate Authority
      placeholder: "e.g. ZeroSSL, Google Trust Services, Buypass, MyCA"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production
        - Staging
        - Both
    validations:
      required: true

  - type: input
    id: directory_url
    attributes:
      label: ACME directory URL
      description: Leave blank for the built-in providers.
      placeholder: "https://acme.example.com/directory"

  - type: dropdown
    id: challenge
    attributes:
      label: Challenge type
      options:
        - http-01
        - dns-01
        - tls-alpn-01
        - Not applicable
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "e.g. 8.3.12"
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: CoyoteCert version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: textarea
    id: ca_response
    attributes:
      label: Raw CA error response
      description: Paste the full JSON body returned by the CA. This is the most useful piece of information — please do not summarise it.
      render: json
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproduction
      render: php
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What did you expect the CA to accept?
      description: Describe what CoyoteCert sent and why you believe it is correct per RFC 8555.
    validations:
      required: true

  - type: checkboxes
    id: staging
    attributes:
      label: Staging check
      options:
        - label: I have confirmed the issue also reproduces against the CA's staging environment (if one exists)
